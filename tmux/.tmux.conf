set -g mouse on

set -g base-index 1

# --- spawn new windows in the current directory ---
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

set -g history-limit 50000

set -g set-clipboard on

set -g status-interval 2

# --- status bar ---
set -g status-style bg=default,fg=white

# --- window tabs ---
set -g window-status-style fg=colour244,bg=default
set -g window-status-current-style fg=cyan,bold,bg=default

# --- pane borders ---
set -g pane-border-style fg=#2a2e3a
set -g pane-active-border-style fg=#4c566a

# --- messages / command line ---
set -g message-style bg=black,fg=yellow
set -g message-command-style bg=black,fg=cyan

# --- copy mode ---
set -g mode-style bg=colour235,fg=white

set -g status-left-length 100
set -g status-right-length 100
set -g status-right "#[fg=cyan]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD)  #[fg=colour240]%Y-%m-%d  #[fg=cyan]%H:%M"
